<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <div></div>
    <label for="inputX1">X1 value:</label>
    <input type="number" id="inputX1">

    <label for="inputY1">Y1 value:</label>
    <input type="number" id="inputY1">
    <div>
    <label for="inputX2">X2 value:</label>
    <input type="number" id="inputX2">
    <label for="inputY2">Y2 value:</label>
    <input type="number" id="inputY2">
    </div>
    <div>
    <label for="scalar">Scalar:</label>
    <input type="number" id="scalar">

    <label for="opSelect">Operation:</label>
    <select id="opSelect">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
      <option value="multiply">Multiply</option>
      <option value="divide">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle Between</option>
      <option value="area">Area</option>

    </select>
    </div>



    <button onclick="handleDrawEvent()">DRAW!</button>

    <button onclick="handleDrawOperationEvent()">APPLY OPERATION</button>
  </body>
</html>
